<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Phantom Mail — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-screen { width: 100%; max-width: 400px; padding: 20px; }
        .login-card { background: #1a1a2e; border: 1px solid #3a3a5c; border-radius: 20px; padding: 40px 32px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
        .login-logo { text-align: center; font-size: 36px; margin-bottom: 8px; }
        .login-title { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .login-title span { color: #ff6b35; }
        .login-sub { text-align: center; color: #666; font-size: 13px; margin-bottom: 32px; }
        .field-label { font-size: 12px; color: #888; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .field-input { width: 100%; background: #252540; border: 1px solid #3a3a5c; border-radius: 10px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none; margin-bottom: 20px; transition: border-color .2s; }
        .field-input:focus { border-color: #ff6b35; }
        .login-btn-submit { width: 100%; background: linear-gradient(135deg,#ff6b35,#f7931e); border: none; color: #fff; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .15s; }
        .login-btn-submit:hover { opacity: .9; transform: translateY(-1px); }
        .login-btn-submit:active { transform: scale(.98); }
        .login-error { color: #ff6b6b; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
        .dashboard { display: none; width: 100%; min-height: 100vh; align-items: flex-start; justify-content: center; }
        .dashboard.active { display: flex; }
        body.dashboard-active { align-items: flex-start; }
        .dash-wrap { width: 100%; max-width: 900px; padding: 24px 16px; }
        .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #3a3a5c; flex-wrap: wrap; gap: 12px; }
        .dash-title { font-size: 20px; font-weight: 700; }
        .dash-title span { color: #ff6b35; }
        .logout-btn { background: #252540; border: 1px solid #3a3a5c; color: #aaa; padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all .2s; }
        .logout-btn:hover { border-color: #ff6b35; color: #fff; }
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: #1a1a2e; border: 1px solid #3a3a5c; border-radius: 14px; padding: 18px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: #fff; }
        .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card.prem .stat-number { color: #ffd700; }
        .section-tabs { display: flex; margin-bottom: 20px; border: 1px solid #3a3a5c; border-radius: 12px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #1a1a2e; color: #888; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
        .tab-btn.active { background: #252540; color: #fff; }
        .tab-btn:hover:not(.active) { color: #ccc; }
        .search-section { background: #1a1a2e; border: 1px solid #3a3a5c; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .search-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #ccc; }
        .search-row { display: flex; gap: 10px; }
        .search-input { flex: 1; background: #252540; border: 1px solid #3a3a5c; border-radius: 10px; padding: 11px 14px; color: #fff; font-size: 14px; outline: none; transition: border-color .2s; }
        .search-input:focus { border-color: #ff6b35; }
        .search-btn { background: #ff6b35; border: none; color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; white-space: nowrap; }
        .search-btn:hover { opacity: .85; }
        .user-card { background: #252540; border-radius: 12px; padding: 18px; display: none; margin-top: 14px; }
        .user-card.visible { display: block; }
        .user-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
        .user-avatar { width: 44px; height: 44px; border-radius: 50%; background: #3a3a5c; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
        .user-avatar.premium { background: rgba(255,215,0,.15); border: 2px solid #ffd700; color: #ffd700; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 15px; font-weight: 700; }
        .user-meta { font-size: 12px; color: #888; margin-top: 2px; }
        .user-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
        .user-badge.premium { background: rgba(255,215,0,.15); color: #ffd700; border: 1px solid #ffd700; }
        .user-badge.free { background: #1a1a2e; color: #888; border: 1px solid #3a3a5c; }
        .user-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .detail-item { background: #1a1a2e; border-radius: 8px; padding: 9px 12px; }
        .detail-key { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .detail-val { font-size: 13px; font-weight: 500; color: #ddd; word-break: break-all; }
        .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .days-input { width: 90px; background: #1a1a2e; border: 1px solid #3a3a5c; border-radius: 8px; padding: 10px; color: #fff; font-size: 14px; outline: none; text-align: center; }
        .grant-btn { flex: 1; min-width: 120px; background: linear-gradient(135deg,#ffd700,#ff8c00); border: none; color: #1a1a2e; padding: 10px 12px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .15s; }
        .grant-btn:hover { opacity: .9; transform: translateY(-1px); }
        .revoke-btn { background: #252540; border: 1px solid #ff6b6b; color: #ff6b6b; padding: 10px 16px; border-radius: 10px; font-size: 13px; cursor: pointer; transition: all .2s; }
        .revoke-btn:hover { background: #ff6b6b; color: #fff; }
        .action-msg { margin-top: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13px; text-align: center; display: none; }
        .action-msg.success { background: rgba(0,208,156,.15); color: #00d09c; border: 1px solid rgba(0,208,156,.3); }
        .action-msg.error { background: rgba(255,107,107,.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,.3); }
        .users-section { background: #1a1a2e; border: 1px solid #3a3a5c; border-radius: 16px; padding: 20px; }
        .users-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
        .users-title { font-size: 14px; font-weight: 600; color: #ccc; }
        .filter-btns { display: flex; gap: 6px; }
        .filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid #3a3a5c; background: #252540; color: #888; cursor: pointer; transition: all .2s; }
        .filter-btn.active { background: #ff6b35; border-color: #ff6b35; color: #fff; }
        .filter-btn:hover:not(.active) { color: #ccc; }
        .users-table { width: 100%; border-collapse: collapse; }
        .users-table th { padding: 10px 12px; text-align: left; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a40; }
        .users-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #1e1e30; vertical-align: middle; }
        .users-table tr:last-child td { border-bottom: none; }
        .users-table tr:hover td { background: rgba(255,255,255,.02); }
        .tbl-username { font-weight: 600; color: #fff; }
        .tbl-email { color: #888; font-size: 12px; }
        .tbl-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .tbl-badge.premium { background: rgba(255,215,0,.15); color: #ffd700; }
        .tbl-badge.free { background: rgba(255,255,255,.05); color: #888; }
        .tbl-date { color: #666; font-size: 12px; }
        .tbl-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .tbl-grant { background: rgba(255,215,0,.15); border: 1px solid rgba(255,215,0,.4); color: #ffd700; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap; }
        .tbl-grant:hover { background: #ffd700; color: #1a1a2e; }
        .tbl-revoke { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3); color: #ff6b6b; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap; }
        .tbl-revoke:hover { background: #ff6b6b; color: #fff; }
        .tbl-delete { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3); color: #ff6b6b; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap; }
        .tbl-delete:hover { background: #ff6b6b; color: #fff; }
        .delete-user-btn { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.4); color: #ff6b6b; padding: 10px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; transition: all .2s; }
        .delete-user-btn:hover { background: #ff6b6b; color: #fff; }
        .load-more-btn { width: 100%; margin-top: 14px; padding: 10px; background: #252540; border: 1px solid #3a3a5c; border-radius: 10px; color: #888; font-size: 13px; cursor: pointer; transition: all .2s; }
        .load-more-btn:hover { color: #fff; border-color: #ff6b35; }
        .empty-list { text-align: center; color: #666; padding: 30px 0; font-size: 14px; }
        .loading-row { text-align: center; color: #666; padding: 20px 0; font-size: 14px; }
        .admin-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #252540; border: 1px solid #3a3a5c; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; transition: transform .3s ease; z-index: 9999; white-space: nowrap; pointer-events: none; }
        .admin-toast.show { transform: translateX(-50%) translateY(0); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #1a1a2e; border: 1px solid #3a3a5c; border-radius: 16px; padding: 28px 24px; width: 90%; max-width: 380px; }
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .modal-sub { color: #888; font-size: 13px; margin-bottom: 16px; }
        .modal-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        .modal-input { width: 100%; background: #252540; border: 1px solid #3a3a5c; border-radius: 8px; padding: 10px 12px; color: #fff; font-size: 14px; outline: none; margin-bottom: 16px; }
        .modal-input:focus { border-color: #ff6b35; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-cancel { flex: 1; padding: 10px; background: #252540; border: 1px solid #3a3a5c; border-radius: 8px; color: #aaa; cursor: pointer; font-size: 14px; transition: all .2s; }
        .modal-cancel:hover { color: #fff; }
        .modal-confirm { flex: 1; padding: 10px; background: linear-gradient(135deg,#ffd700,#ff8c00); border: none; border-radius: 8px; color: #1a1a2e; font-weight: 700; cursor: pointer; font-size: 14px; transition: opacity .2s; }
        .modal-confirm:hover { opacity: .9; }
        .modal-msg { margin-top: 10px; font-size: 13px; text-align: center; display: none; }
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .user-details { grid-template-columns: 1fr; }
            .action-row { flex-direction: column; }
            .days-input, .grant-btn, .revoke-btn { width: 100%; }
            .tbl-actions { flex-direction: column; }
            .users-table th:nth-child(3), .users-table td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

    <div class="login-screen" id="login-screen">
        <div class="login-card">
            <div class="login-logo">&#128123;</div>
            <div class="login-title">Phantom <span>ADMIN</span></div>
            <div class="login-sub">Restricted access. Authorized personnel only.</div>
            <label class="field-label" for="admin-secret">Admin Secret</label>
            <input type="password" id="admin-secret" class="field-input" placeholder="Enter your admin secret" autocomplete="off">
            <button class="login-btn-submit" onclick="adminLogin()">Authenticate</button>
            <p class="login-error" id="login-error"></p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="dash-wrap">
            <div class="dash-header">
                <div class="dash-title">&#128123; Phantom <span>ADMIN</span></div>
                <button class="logout-btn" onclick="adminLogout()">Logout</button>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-number" id="stat-total">&mdash;</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card prem">
                    <div class="stat-number" id="stat-premium">&mdash;</div>
                    <div class="stat-label">Premium</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-free">&mdash;</div>
                    <div class="stat-label">Free</div>
                </div>
            </div>

            <div class="section-tabs">
                <button class="tab-btn active" id="tab-list" onclick="showTab('list')">&#128101; All Users</button>
                <button class="tab-btn" id="tab-search" onclick="showTab('search')">&#128269; Find User</button>
            </div>

            <!-- All Users -->
            <div id="section-list">
                <div class="users-section">
                    <div class="users-header">
                        <div class="users-title">Users</div>
                        <div class="filter-btns">
                            <button class="filter-btn active" onclick="setFilter('all')">All</button>
                            <button class="filter-btn" onclick="setFilter('premium')">&#11088; Premium</button>
                            <button class="filter-btn" onclick="setFilter('free')">Free</button>
                        </div>
                    </div>
                    <div id="users-list-container"><div class="loading-row">Loading users&#8230;</div></div>
                    <button class="load-more-btn" id="load-more-btn" style="display:none" onclick="loadMoreUsers()">Load More</button>
                </div>
            </div>

            <!-- Search User -->
            <div id="section-search" style="display:none">
                <div class="search-section">
                    <div class="search-title">&#128269; Find User by Username</div>
                    <div class="search-row">
                        <input type="text" id="search-username" class="search-input" placeholder="Enter username&#8230;" autocomplete="off">
                        <button class="search-btn" onclick="searchUser()">Lookup</button>
                    </div>
                    <div class="user-card" id="user-card">
                        <div class="user-row">
                            <div class="user-avatar" id="user-avatar">?</div>
                            <div class="user-info">
                                <div class="user-name" id="user-name-display">&mdash;</div>
                                <div class="user-meta" id="user-meta">&mdash;</div>
                            </div>
                            <span class="user-badge" id="user-badge">Free</span>
                        </div>
                        <div class="user-details" id="user-details"></div>
                        <div class="action-row">
                            <input type="number" id="days-input" class="days-input" value="365" min="1" max="3650" title="Days of premium">
                            <button class="grant-btn" onclick="grantPremium()">&#11088; Grant Premium</button>
                            <button class="revoke-btn" onclick="revokePremium()">&#10005; Revoke</button>
                            <button class="delete-user-btn" onclick="deleteSearchedUser()">&#128465; Delete Account</button>
                        </div>
                        <div class="action-msg" id="action-msg"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-toast" id="admin-toast"></div>

    <!-- Grant Modal -->
    <div class="modal-overlay" id="grant-modal">
        <div class="modal-box">
            <div class="modal-title">&#11088; Grant Premium</div>
            <div class="modal-sub">User: <strong id="grant-modal-user" style="color:#fff;"></strong></div>
            <label class="modal-label">Days</label>
            <input type="number" id="grant-modal-days" class="modal-input" value="365" min="1" max="3650">
            <div class="modal-btns">
                <button class="modal-cancel" onclick="closeGrantModal()">Cancel</button>
                <button class="modal-confirm" onclick="confirmGrant()">Grant</button>
            </div>
            <div class="modal-msg" id="grant-modal-msg"></div>
        </div>
    </div>

    <!-- Delete User Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-box">
            <div class="modal-title" style="color:#ff6b6b;">&#128465; Delete Account</div>
            <div class="modal-sub">Permanently delete <strong id="delete-modal-user" style="color:#fff;"></strong>? This cannot be undone.</div>
            <div class="modal-btns">
                <button class="modal-cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="modal-confirm" style="background:linear-gradient(135deg,#ff6b6b,#cc3333);" onclick="confirmDeleteUser()">Delete</button>
            </div>
            <div class="modal-msg" id="delete-modal-msg"></div>
        </div>
    </div>

    <script>
        let adminToken = sessionStorage.getItem('adminToken') || null;
        let currentUser = null;
        let usersFilter = 'all';
        let usersCursor = null;
        let usersHasMore = false;
        let grantModalUsername = null;

        window.onload = function() { if (adminToken) showDashboard(); };

        async function adminLogin() {
            const secret = document.getElementById('admin-secret').value.trim();
            if (!secret) return;
            const btn = document.querySelector('.login-btn-submit');
            btn.disabled = true; btn.textContent = 'Authenticating…';
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ secret })
                });
                const data = await res.json();
                if (res.ok && data.adminToken) {
                    adminToken = data.adminToken;
                    sessionStorage.setItem('adminToken', adminToken);
                    showDashboard();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                    btn.disabled = false; btn.textContent = 'Authenticate';
                }
            } catch(e) {
                document.getElementById('login-error').style.display = 'block';
                btn.disabled = false; btn.textContent = 'Authenticate';
            }
        }

        document.getElementById('admin-secret').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            document.body.classList.add('dashboard-active');
            loadStats();
            loadUsers(true);
        }

        function adminLogout() {
            adminToken = null;
            sessionStorage.removeItem('adminToken');
            location.reload();
        }

        function showTab(tab) {
            document.getElementById('section-list').style.display = tab === 'list' ? '' : 'none';
            document.getElementById('section-search').style.display = tab === 'search' ? '' : 'none';
            document.getElementById('tab-list').classList.toggle('active', tab === 'list');
            document.getElementById('tab-search').classList.toggle('active', tab === 'search');
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats', { headers: {'X-Admin-Token': adminToken} });
                const data = await res.json();
                document.getElementById('stat-total').textContent = data.total ?? '?';
                document.getElementById('stat-premium').textContent = data.premium ?? '?';
                document.getElementById('stat-free').textContent = data.free ?? '?';
            } catch(e) {}
        }

        function setFilter(f) {
            usersFilter = f;
            document.querySelectorAll('.filter-btn').forEach((btn, i) => {
                btn.classList.toggle('active', ['all','premium','free'][i] === f);
            });
            loadUsers(true);
        }

        async function loadUsers(reset = false) {
            if (reset) { usersCursor = null; }
            const container = document.getElementById('users-list-container');
            if (reset) container.innerHTML = '<div class="loading-row">Loading…</div>';
            try {
                let url = `/api/admin/list-users?filter=${usersFilter}`;
                if (usersCursor) url += '&cursor=' + encodeURIComponent(usersCursor);
                const res = await fetch(url, { headers: {'X-Admin-Token': adminToken} });
                const data = await res.json();
                if (!res.ok) { container.innerHTML = '<div class="empty-list">Error: ' + (data.error||'unknown') + '</div>'; return; }
                usersCursor = data.cursor || null;
                usersHasMore = data.hasMore || false;
                document.getElementById('load-more-btn').style.display = usersHasMore ? '' : 'none';
                if (reset) container.innerHTML = '';
                if (data.users.length === 0 && reset) { container.innerHTML = '<div class="empty-list">No users found.</div>'; return; }
                renderUsersTable(data.users, reset);
            } catch(e) {
                container.innerHTML = '<div class="empty-list">Failed to load users.</div>';
            }
        }

        function renderUsersTable(users, reset) {
            const container = document.getElementById('users-list-container');
            let tbody = reset ? null : document.getElementById('users-tbody');
            if (!tbody) {
                container.innerHTML = '<table class="users-table"><thead><tr><th>Username</th><th>Status</th><th>Joined</th><th style="text-align:right">Actions</th></tr></thead><tbody id="users-tbody"></tbody></table>';
                tbody = document.getElementById('users-tbody');
            }
            users.forEach(u => {
                const row = document.createElement('tr');
                const expiry = u.premiumExpiry ? esc(new Date(u.premiumExpiry).toLocaleDateString()) : null;
                const joined = u.createdAt ? esc(new Date(u.createdAt).toLocaleDateString()) : '\u2014';
                const actionBtn = document.createElement('button');
                actionBtn.className = u.isPremium ? 'tbl-revoke' : 'tbl-grant';
                actionBtn.textContent = u.isPremium ? 'Revoke' : '\u2b50 Grant';
                actionBtn.addEventListener('click', function() {
                    if (u.isPremium) quickRevoke(u.username);
                    else openGrantModal(u.username);
                });
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'tbl-delete';
                deleteBtn.textContent = '🗑️ Delete';
                deleteBtn.addEventListener('click', function() { openDeleteModal(u.username); });
                row.innerHTML = '<td><div class="tbl-username">' + esc(u.username) + '</div><div class="tbl-email">' + esc(u.email||'') + '</div></td>' +
                    '<td><span class="tbl-badge ' + (u.isPremium ? 'premium' : 'free') + '">' + (u.isPremium ? '\u2b50 Premium' : 'Free') + '</span>' +
                    (u.isPremium && expiry ? '<div style="font-size:11px;color:#888;margin-top:2px;">Until ' + expiry + '</div>' : '') + '</td>' +
                    '<td class="tbl-date">' + joined + '</td>' +
                    '<td><div class="tbl-actions"></div></td>';
                row.querySelector('.tbl-actions').appendChild(actionBtn);
                row.querySelector('.tbl-actions').appendChild(deleteBtn);
                tbody.appendChild(row);
            });
        }

        async function loadMoreUsers() { await loadUsers(false); }

        function openGrantModal(username) {
            grantModalUsername = username;
            document.getElementById('grant-modal-user').textContent = '@' + username;
            document.getElementById('grant-modal-days').value = '365';
            document.getElementById('grant-modal-msg').style.display = 'none';
            document.getElementById('grant-modal').classList.add('show');
        }
        function closeGrantModal() { document.getElementById('grant-modal').classList.remove('show'); }

        async function confirmGrant() {
            const days = parseInt(document.getElementById('grant-modal-days').value) || 365;
            const msgEl = document.getElementById('grant-modal-msg');
            try {
                const res = await fetch('/api/admin/grant-premium', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','X-Admin-Token': adminToken},
                    body: JSON.stringify({ username: grantModalUsername, days })
                });
                const data = await res.json();
                if (res.ok) {
                    msgEl.textContent = '✅ ' + data.message;
                    msgEl.style.cssText = 'display:block;color:#00d09c;';
                    setTimeout(() => { closeGrantModal(); loadUsers(true); loadStats(); }, 1200);
                } else {
                    msgEl.textContent = '❌ ' + (data.error||'Error');
                    msgEl.style.cssText = 'display:block;color:#ff6b6b;';
                }
            } catch(e) { msgEl.textContent = '❌ Network error'; msgEl.style.cssText = 'display:block;color:#ff6b6b;'; }
        }

        async function quickRevoke(username) {
            if (!confirm('Revoke premium from @' + username + '?')) return;
            try {
                const res = await fetch('/api/admin/revoke-premium', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','X-Admin-Token': adminToken},
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (res.ok) { showToast('✅ ' + data.message); loadUsers(true); loadStats(); }
                else showToast('❌ ' + (data.error||'Error'));
            } catch(e) { showToast('❌ Network error'); }
        }

        let deleteModalUsername = null;

        function openDeleteModal(username) {
            deleteModalUsername = username;
            document.getElementById('delete-modal-user').textContent = '@' + username;
            document.getElementById('delete-modal-msg').style.display = 'none';
            document.getElementById('delete-modal').classList.add('show');
        }
        function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('show'); deleteModalUsername = null; }

        async function confirmDeleteUser() {
            if (!deleteModalUsername) return;
            const msgEl = document.getElementById('delete-modal-msg');
            try {
                const res = await fetch('/api/admin/delete-user', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','X-Admin-Token': adminToken},
                    body: JSON.stringify({ username: deleteModalUsername })
                });
                const data = await res.json();
                if (res.ok) {
                    msgEl.textContent = '✅ ' + data.message;
                    msgEl.style.cssText = 'display:block;color:#00d09c;';
                    setTimeout(() => { closeDeleteModal(); loadUsers(true); loadStats(); }, 1200);
                } else {
                    msgEl.textContent = '❌ ' + (data.error||'Error');
                    msgEl.style.cssText = 'display:block;color:#ff6b6b;';
                }
            } catch(e) { msgEl.textContent = '❌ Network error'; msgEl.style.cssText = 'display:block;color:#ff6b6b;'; }
        }

        function deleteSearchedUser() {
            if (!currentUser) return;
            openDeleteModal(currentUser.username);
        }

        async function searchUser() {
            const username = document.getElementById('search-username').value.trim();
            if (!username) return;
            const card = document.getElementById('user-card');
            card.classList.remove('visible');
            try {
                const res = await fetch(`/api/admin/user?username=${encodeURIComponent(username)}`, { headers: {'X-Admin-Token': adminToken} });
                const data = await res.json();
                if (!res.ok) { showActionMsg('error', data.error||'User not found'); card.classList.add('visible'); return; }
                currentUser = data;
                renderUserCard(data);
                card.classList.add('visible');
            } catch(e) { showActionMsg('error', 'Network error'); card.classList.add('visible'); }
        }

        document.getElementById('search-username').addEventListener('keydown', e => { if (e.key === 'Enter') searchUser(); });

        function renderUserCard(u) {
            const isPremium = u.isPremium;
            const avatar = document.getElementById('user-avatar');
            avatar.textContent = u.username.charAt(0).toUpperCase();
            avatar.className = 'user-avatar' + (isPremium ? ' premium' : '');
            document.getElementById('user-name-display').textContent = '@' + u.username;
            document.getElementById('user-meta').textContent = u.email || 'No email provided';
            const badge = document.getElementById('user-badge');
            badge.textContent = isPremium ? '⭐ Premium' : 'Free';
            badge.className = 'user-badge ' + (isPremium ? 'premium' : 'free');
            const expiry = u.premiumExpiry ? new Date(u.premiumExpiry).toLocaleDateString() : 'N/A';
            const created = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—';
            document.getElementById('user-details').innerHTML =
                '<div class="detail-item"><div class="detail-key">Joined</div><div class="detail-val">' + created + '</div></div>' +
                '<div class="detail-item"><div class="detail-key">Premium Until</div><div class="detail-val">' + expiry + '</div></div>' +
                '<div class="detail-item"><div class="detail-key">Saved Emails</div><div class="detail-val">' + u.savedEmails + '</div></div>' +
                '<div class="detail-item"><div class="detail-key">API Key</div><div class="detail-val">' + (u.hasApiKey ? '✅ Yes' : '❌ No') + '</div></div>';
            document.getElementById('action-msg').style.display = 'none';
        }

        async function grantPremium() {
            if (!currentUser) return;
            const days = parseInt(document.getElementById('days-input').value) || 365;
            try {
                const res = await fetch('/api/admin/grant-premium', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','X-Admin-Token': adminToken},
                    body: JSON.stringify({ username: currentUser.username, days })
                });
                const data = await res.json();
                if (res.ok) { showActionMsg('success', data.message); currentUser.isPremium = true; currentUser.premiumExpiry = Date.now() + days*86400000; renderUserCard(currentUser); loadStats(); }
                else showActionMsg('error', data.error);
            } catch(e) { showActionMsg('error', 'Network error'); }
        }

        async function revokePremium() {
            if (!currentUser) return;
            try {
                const res = await fetch('/api/admin/revoke-premium', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','X-Admin-Token': adminToken},
                    body: JSON.stringify({ username: currentUser.username })
                });
                const data = await res.json();
                if (res.ok) { showActionMsg('success', data.message); currentUser.isPremium = false; currentUser.premiumExpiry = null; renderUserCard(currentUser); loadStats(); }
                else showActionMsg('error', data.error);
            } catch(e) { showActionMsg('error', 'Network error'); }
        }

        function showActionMsg(type, msg) {
            const el = document.getElementById('action-msg');
            el.textContent = msg; el.className = 'action-msg ' + type; el.style.display = 'block';
        }

        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('admin-toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
        }

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
    </script>
</body>
</html>
