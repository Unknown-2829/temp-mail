<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Phantom Mail — Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Login Screen */
        .login-screen {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            text-align: center;
            font-size: 36px;
            margin-bottom: 8px;
        }

        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-title span {
            color: #ff6b35;
        }

        .login-sub {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 32px;
        }

        .field-label {
            font-size: 12px;
            color: #888;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .field-input {
            width: 100%;
            background: #252540;
            border: 1px solid #3a3a5c;
            border-radius: 10px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .field-input:focus {
            border-color: #ff6b35;
        }

        .login-btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            color: #fff;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        .login-btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .login-btn-submit:active {
            transform: scale(0.98);
        }

        .login-error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 0;
            align-items: flex-start;
            justify-content: center;
        }

        .dashboard.active {
            display: flex;
        }

        body.dashboard-active {
            align-items: flex-start;
        }

        .dash-wrap {
            width: 100%;
            max-width: 760px;
            padding: 30px 20px;
        }

        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #3a3a5c;
        }

        .dash-title {
            font-size: 20px;
            font-weight: 700;
        }

        .dash-title span {
            color: #ff6b35;
        }

        .logout-btn {
            background: #252540;
            border: 1px solid #3a3a5c;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: #ff6b35;
            color: #fff;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card.prem .stat-number {
            color: #ffd700;
        }

        /* Search */
        .search-section {
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .search-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ccc;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .search-input {
            flex: 1;
            background: #252540;
            border: 1px solid #3a3a5c;
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #ff6b35;
        }

        .search-btn {
            background: #ff6b35;
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .search-btn:hover {
            opacity: 0.85;
        }

        /* User Card */
        .user-card {
            background: #252540;
            border-radius: 12px;
            padding: 20px;
            display: none;
            margin-top: 16px;
        }

        .user-card.visible {
            display: block;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #3a3a5c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-avatar.premium {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            color: #ffd700;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 16px;
            font-weight: 700;
        }

        .user-meta {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        .user-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .user-badge.premium {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border: 1px solid #ffd700;
        }

        .user-badge.free {
            background: #252540;
            color: #888;
            border: 1px solid #3a3a5c;
        }

        .user-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .detail-item {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 10px 14px;
        }

        .detail-key {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .detail-val {
            font-size: 13px;
            font-weight: 500;
            color: #ddd;
            word-break: break-all;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .days-input {
            width: 100px;
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        .grant-btn {
            flex: 1;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #1a1a2e;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        .grant-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .revoke-btn {
            background: #252540;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .revoke-btn:hover {
            background: #ff6b6b;
            color: #fff;
        }

        .action-msg {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .action-msg.success {
            background: rgba(0, 208, 156, 0.15);
            color: #00d09c;
            border: 1px solid rgba(0, 208, 156, 0.3);
        }

        .action-msg.error {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
    </style>
</head>

<body>

    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
        <div class="login-card">
            <div class="login-logo">👻</div>
            <div class="login-title">Phantom <span>ADMIN</span></div>
            <div class="login-sub">Restricted access. Authorized personnel only.</div>
            <label class="field-label" for="admin-secret">Admin Secret</label>
            <input type="password" id="admin-secret" class="field-input" placeholder="Enter your admin secret"
                autocomplete="off">
            <button class="login-btn-submit" onclick="adminLogin()">Authenticate</button>
            <p class="login-error" id="login-error">Invalid secret. Access denied.</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="dash-wrap">
            <div class="dash-header">
                <div class="dash-title">👻 Phantom <span>ADMIN</span></div>
                <button class="logout-btn" onclick="adminLogout()">Logout</button>
            </div>

            <!-- Stats -->
            <div class="stats-row" id="stats-row">
                <div class="stat-card">
                    <div class="stat-number" id="stat-total">—</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card prem">
                    <div class="stat-number" id="stat-premium">—</div>
                    <div class="stat-label">Premium</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-free">—</div>
                    <div class="stat-label">Free</div>
                </div>
            </div>

            <!-- Search User -->
            <div class="search-section">
                <div class="search-title">🔍 Find User</div>
                <div class="search-row">
                    <input type="text" id="search-username" class="search-input" placeholder="Enter username..."
                        autocomplete="off">
                    <button class="search-btn" onclick="searchUser()">Lookup</button>
                </div>

                <!-- User Card -->
                <div class="user-card" id="user-card">
                    <div class="user-row">
                        <div class="user-avatar" id="user-avatar">?</div>
                        <div class="user-info">
                            <div class="user-name" id="user-name-display">—</div>
                            <div class="user-meta" id="user-meta">—</div>
                        </div>
                        <span class="user-badge" id="user-badge">Free</span>
                    </div>

                    <div class="user-details" id="user-details"></div>

                    <div class="action-row">
                        <input type="number" id="days-input" class="days-input" value="365" min="1" max="3650"
                            title="Days of premium">
                        <button class="grant-btn" onclick="grantPremium()">⭐ Grant Premium</button>
                        <button class="revoke-btn" onclick="revokePremium()">✕ Revoke</button>
                    </div>
                    <div class="action-msg" id="action-msg"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let adminToken = sessionStorage.getItem('adminToken') || null;
        let currentUser = null;

        window.onload = function () {
            if (adminToken) showDashboard();
        };

        // ===== Login =====
        async function adminLogin() {
            const secret = document.getElementById('admin-secret').value.trim();
            if (!secret) return;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret })
                });
                const data = await res.json();
                if (res.ok && data.adminToken) {
                    adminToken = data.adminToken;
                    sessionStorage.setItem('adminToken', adminToken);
                    showDashboard();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        document.getElementById('admin-secret').addEventListener('keydown', e => {
            if (e.key === 'Enter') adminLogin();
        });

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            document.body.classList.add('dashboard-active');
            loadStats();
        }

        function adminLogout() {
            adminToken = null;
            sessionStorage.removeItem('adminToken');
            location.reload();
        }

        // ===== Stats =====
        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'X-Admin-Token': adminToken }
                });
                const data = await res.json();
                document.getElementById('stat-total').textContent = data.total ?? '?';
                document.getElementById('stat-premium').textContent = data.premium ?? '?';
                document.getElementById('stat-free').textContent = data.free ?? '?';
            } catch (e) { }
        }

        // ===== Search User =====
        async function searchUser() {
            const username = document.getElementById('search-username').value.trim();
            if (!username) return;

            const card = document.getElementById('user-card');
            card.classList.remove('visible');

            try {
                const res = await fetch(`/api/admin/user?username=${encodeURIComponent(username)}&adminToken=${adminToken}`, {
                    headers: { 'X-Admin-Token': adminToken }
                });
                const data = await res.json();

                if (!res.ok) {
                    showActionMsg('error', data.error || 'User not found');
                    card.classList.add('visible');
                    return;
                }

                currentUser = data;
                renderUserCard(data);
                card.classList.add('visible');
            } catch (e) {
                showActionMsg('error', 'Network error');
                card.classList.add('visible');
            }
        }

        function renderUserCard(u) {
            const isPremium = u.isPremium;
            const avatar = document.getElementById('user-avatar');
            avatar.textContent = u.username.charAt(0).toUpperCase();
            avatar.className = 'user-avatar' + (isPremium ? ' premium' : '');

            document.getElementById('user-name-display').textContent = '@' + u.username;
            document.getElementById('user-meta').textContent = u.email || 'No email provided';

            const badge = document.getElementById('user-badge');
            badge.textContent = isPremium ? '⭐ Premium' : 'Free';
            badge.className = 'user-badge ' + (isPremium ? 'premium' : 'free');

            const expiry = u.premiumExpiry ? new Date(u.premiumExpiry).toLocaleDateString() : 'N/A';
            const created = new Date(u.createdAt).toLocaleDateString();

            document.getElementById('user-details').innerHTML = `
      <div class="detail-item"><div class="detail-key">Joined</div><div class="detail-val">${created}</div></div>
      <div class="detail-item"><div class="detail-key">Premium Until</div><div class="detail-val">${expiry}</div></div>
      <div class="detail-item"><div class="detail-key">Saved Emails</div><div class="detail-val">${u.savedEmails}</div></div>
      <div class="detail-item"><div class="detail-key">API Key</div><div class="detail-val">${u.hasApiKey ? '✅ Yes' : '❌ No'}</div></div>
    `;

            document.getElementById('action-msg').style.display = 'none';
        }

        // ===== Grant Premium =====
        async function grantPremium() {
            if (!currentUser) return;
            const days = parseInt(document.getElementById('days-input').value) || 365;

            try {
                const res = await fetch('/api/admin/grant-premium', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminToken },
                    body: JSON.stringify({ username: currentUser.username, adminToken, days })
                });
                const data = await res.json();
                if (res.ok) {
                    showActionMsg('success', data.message);
                    currentUser.isPremium = true;
                    currentUser.premiumExpiry = Date.now() + days * 86400000;
                    renderUserCard(currentUser);
                    loadStats();
                } else {
                    showActionMsg('error', data.error);
                }
            } catch (e) { showActionMsg('error', 'Network error'); }
        }

        // ===== Revoke Premium =====
        async function revokePremium() {
            if (!currentUser) return;

            try {
                const res = await fetch('/api/admin/revoke-premium', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminToken },
                    body: JSON.stringify({ username: currentUser.username, adminToken })
                });
                const data = await res.json();
                if (res.ok) {
                    showActionMsg('success', data.message);
                    currentUser.isPremium = false;
                    currentUser.premiumExpiry = null;
                    renderUserCard(currentUser);
                    loadStats();
                } else {
                    showActionMsg('error', data.error);
                }
            } catch (e) { showActionMsg('error', 'Network error'); }
        }

        function showActionMsg(type, msg) {
            const el = document.getElementById('action-msg');
            el.textContent = msg;
            el.className = 'action-msg ' + type;
            el.style.display = 'block';
        }
    </script>
</body>

</html>
